<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #wrapper {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Bottom bar */
  #bottom-bar {
    position: absolute;
    bottom: 3.2%;
    left: 4%; width: 92%;
    display: flex;
    align-items: center;
    gap: 2.5%;
    user-select: none;
  }

  .box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    text-align: center;
    padding: 3% 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #box-left {
    width: 20%; flex-shrink: 0;
    font-size: clamp(8px, 1.25vw, 20px);
    letter-spacing: 0.28em;
    cursor: pointer;
    pointer-events: all;
  }

  #box-centre {
    flex: 1;
    font-size: clamp(9px, 1.35vw, 22px);
    letter-spacing: 0.07em;
    min-width: 0;
    pointer-events: none;
  }

  #ln-name {
    display: inline-block;
    opacity: 0;
    transition: opacity 0.8s ease;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #ln-name.visible { opacity: 1; }

  #box-right {
    width: 20%; flex-shrink: 0;
    font-size: clamp(12px, 1.75vw, 26px);
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  /* Settings overlay */
  #settings-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #settings-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* PIN screen */
  #pin-screen {
    width: 72%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #settings-screen {
    width: 82%;
    display: none;
    flex-direction: column;
    align-items: center;
  }

  .overlay-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(10px, 1.5vw, 22px);
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.28);
    margin-bottom: 10%;
  }

  #pin-dots {
    display: flex;
    gap: 7%;
    margin-bottom: 5%;
  }
  .pin-dot {
    width: clamp(10px, 1.5vw, 18px);
    height: clamp(10px, 1.5vw, 18px);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.28);
    background: transparent;
    transition: background 0.12s;
  }
  .pin-dot.filled { background: rgba(255,255,255,0.85); }

  #pin-error {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(7px, 0.95vw, 13px);
    letter-spacing: 0.14em;
    color: rgba(255,90,90,0.7);
    height: 1.4em;
    margin-bottom: 7%;
    text-align: center;
  }

  #pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3%;
    width: 100%;
  }
  .pin-key {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(14px, 2.2vw, 34px);
    color: rgba(255,255,255,0.72);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    user-select: none;
  }
  .pin-key:active { background: rgba(255,255,255,0.13); }
  .pin-key.wide {
    grid-column: span 2;
    aspect-ratio: auto;
    padding: 5% 0;
    font-size: clamp(10px, 1.4vw, 20px);
    letter-spacing: 0.15em;
  }

  /* Settings panel */
  .settings-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(10px, 1.5vw, 22px);
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.28);
    margin-bottom: 8%;
    width: 100%;
    text-align: center;
  }

  .setting-row { width: 100%; margin-bottom: 5%; }
  .setting-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(7px, 0.9vw, 13px);
    letter-spacing: 0.24em;
    color: rgba(255,255,255,0.28);
    margin-bottom: 2.5%;
  }
  .setting-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(8px, 1.2vw, 18px);
    color: rgba(255,255,255,0.78);
    padding: 3.5% 4%;
    width: 100%;
    outline: none;
    letter-spacing: 0.05em;
  }
  .setting-input:focus { border-color: rgba(255,255,255,0.28); }

  .settings-divider {
    width: 100%;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 5% 0;
  }

  .settings-actions {
    display: flex;
    gap: 3%;
    width: 100%;
    margin-top: 2%;
  }
  .btn-action {
    flex: 1;
    padding: 5% 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(7px, 1vw, 15px);
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: background 0.12s;
    text-align: center;
  }
  .btn-action:active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
  .btn-action.danger { border-color: rgba(255,70,70,0.22); color: rgba(255,95,95,0.55); }
  .btn-action.danger:active { background: rgba(255,60,60,0.1); }

  /* Test controls - remove before event */
  #test-controls {
    position: absolute;
    top: 2.5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2.5%;
    z-index: 100;
    width: 92%;
    justify-content: center;
  }
  #test-controls button {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.16);
    color: rgba(255,255,255,0.5);
    font-family: 'Nunito', sans-serif;
    font-size: clamp(8px, 1.1vw, 16px);
    padding: 1.2% 3.5%;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.07em;
    white-space: nowrap;
  }
  #test-controls button:active { background: rgba(255,255,255,0.13); }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div class="box" id="box-left">BALANCE</div>
    <div class="box" id="box-centre"><span id="ln-name"></span></div>
    <div class="box" id="box-right">0</div>
  </div>

  <!-- Settings overlay -->
  <div id="settings-overlay">

    <!-- PIN entry -->
    <div id="pin-screen">
      <div class="overlay-title">BALANCE</div>
      <div id="pin-dots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div id="pin-error"></div>
      <div id="pin-pad">
        <div class="pin-key" data-k="1">1</div>
        <div class="pin-key" data-k="2">2</div>
        <div class="pin-key" data-k="3">3</div>
        <div class="pin-key" data-k="4">4</div>
        <div class="pin-key" data-k="5">5</div>
        <div class="pin-key" data-k="6">6</div>
        <div class="pin-key" data-k="7">7</div>
        <div class="pin-key" data-k="8">8</div>
        <div class="pin-key" data-k="9">9</div>
        <div class="pin-key wide" data-k="del">DEL</div>
        <div class="pin-key" data-k="0">0</div>
      </div>
    </div>

    <!-- Settings panel (shown after correct PIN) -->
    <div id="settings-screen">
      <div class="settings-title">SETTINGS</div>

      <div class="setting-row">
        <div class="setting-label">ATM WALLET ID</div>
        <input class="setting-input" id="cfg-atm-wallet" type="text" placeholder="wallet id">
      </div>
      <div class="setting-row">
        <div class="setting-label">ATM API KEY</div>
        <input class="setting-input" id="cfg-atm-key" type="password" placeholder="api key">
      </div>

      <hr class="settings-divider">

      <div class="setting-row">
        <div class="setting-label">POLL INTERVAL (seconds)</div>
        <input class="setting-input" id="cfg-poll" type="number" value="10" min="5" max="60">
      </div>

      <hr class="settings-divider">

      <div class="settings-actions">
        <div class="btn-action danger" id="btn-reset-session">CLEAR SESSION</div>
        <div class="btn-action" id="btn-save">SAVE</div>
        <div class="btn-action" id="btn-close-settings">CLOSE</div>
      </div>
    </div>

  </div>

  <!-- TEST CONTROLS - remove before event -->
  <div id="test-controls">
    <button id="btn-visitor">+ Visitor</button>
    <button id="btn-artwork">Artwork Tip</button>
    <button id="btn-clear">Clear</button>
  </div>
</div>

<script>
// ── Canvas ───────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1080, H = 1920;
canvas.width = W; canvas.height = H;

// ── Layout ───────────────────────────────────────────────────────
const CX = W / 2;
const CY = H * 0.45;

const ARTWORK_RING_R = W * 0.44;
const VISITOR_MIN_R  = W * 0.10;
const VISITOR_MAX_R  = W * 0.30;

const R_HUB     = 20;
const R_ARTWORK = 13;
const R_VISITOR = 4;

// ── Artwork dots ─────────────────────────────────────────────────
const NUM_ARTWORKS = 21;
const artworkDots  = Array.from({ length: NUM_ARTWORKS }, (_, i) => {
  const angle = (i / NUM_ARTWORKS) * Math.PI * 2 - Math.PI / 2;
  return {
    x: CX + Math.cos(angle) * ARTWORK_RING_R,
    y: CY + Math.sin(angle) * ARTWORK_RING_R,
    index: i + 1,
    pulseTimer: 0,
    PULSE_DUR: 5000,
  };
});

// ── Visitor dots ─────────────────────────────────────────────────
const visitorDots = [];
let participantCount = 0;

// ── DOM refs ─────────────────────────────────────────────────────
const lnName   = document.getElementById('ln-name');
const boxRight = document.getElementById('box-right');

function showLN(address) {
  lnName.classList.remove('visible');
  setTimeout(() => {
    lnName.textContent = address;
    lnName.classList.add('visible');
  }, 850);
}

function updateCount() { boxRight.textContent = participantCount; }

// ── Add visitor ──────────────────────────────────────────────────
function addVisitor(lnAddress) {
  const angle = Math.random() * Math.PI * 2;
  const t     = Math.pow(Math.random(), 0.65);
  const r     = VISITOR_MIN_R + t * (VISITOR_MAX_R - VISITOR_MIN_R);
  visitorDots.push({ x: CX + Math.cos(angle) * r, y: CY + Math.sin(angle) * r, opacity: 0 });
  participantCount++;
  updateCount();
  if (lnAddress) showLN(lnAddress);
}

// ── Trigger artwork ──────────────────────────────────────────────
function triggerArtwork(index) {
  if (index >= 0 && index < NUM_ARTWORKS)
    artworkDots[index].pulseTimer = artworkDots[index].PULSE_DUR;
}

// ── Draw helpers ─────────────────────────────────────────────────
function drawGlow(x, y, radius, r, g, b, alpha) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius * 6);
  grad.addColorStop(0,   `rgba(${r},${g},${b},${+(alpha*0.45).toFixed(3)})`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},${+(alpha*0.12).toFixed(3)})`);
  grad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(x, y, radius * 6, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawCircle(x, y, radius, r, g, b, alpha) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fill();
  ctx.restore();
}

function drawNumber(x, y, num, alpha) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.fillStyle = '#000';
  ctx.font = `600 ${R_ARTWORK * 1.35}px 'Nunito', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), x, y + 0.5);
  ctx.restore();
}

// ── Render loop ──────────────────────────────────────────────────
let lastTime = performance.now();
let elapsed  = 0;

function render(now) {
  const dt = Math.min(now - lastTime, 80);
  lastTime = now;
  elapsed += dt;

  ctx.clearRect(0, 0, W, H);

  // Hub — breathing pulse
  const breath = 0.7 + 0.3 * (0.5 + 0.5 * Math.sin(elapsed / 4000 * Math.PI * 2));
  drawGlow(CX, CY, R_HUB, 255, 255, 255, breath * 0.75);
  drawCircle(CX, CY, R_HUB, 255, 255, 255, breath);

  // Artwork ring
  for (const dot of artworkDots) {
    if (dot.pulseTimer > 0) dot.pulseTimer = Math.max(0, dot.pulseTimer - dt);
    const t  = dot.pulseTimer / dot.PULSE_DUR;
    const dr = Math.round(255 + (245-255)*t);
    const dg = Math.round(255 + (166-255)*t);
    const db = Math.round(255 + ( 35-255)*t);
    const da = 0.65 + t * 0.35;
    if (t > 0) drawGlow(dot.x, dot.y, R_ARTWORK, 245, 166, 35, t * 0.8);
    drawCircle(dot.x, dot.y, R_ARTWORK, dr, dg, db, da);
    if (t > 0.05) drawNumber(dot.x, dot.y, dot.index, t * da);
  }

  // Visitor swarm
  for (const v of visitorDots) {
    if (v.opacity < 1) v.opacity = Math.min(1, v.opacity + dt / 1200);
    drawCircle(v.x, v.y, R_VISITOR, 255, 255, 255, v.opacity * 0.72);
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── Triple-tap on BALANCE box ────────────────────────────────────
const boxLeft    = document.getElementById('box-left');
const overlay    = document.getElementById('settings-overlay');
let tapCount     = 0;
let tapTimer     = null;

boxLeft.addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 600);
  if (tapCount >= 3) {
    tapCount = 0;
    openOverlay();
  }
});

function openOverlay() {
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('settings-screen').style.display = 'none';
  overlay.classList.add('visible');
}

function closeOverlay() {
  overlay.classList.remove('visible');
}

// ── PIN logic ────────────────────────────────────────────────────
const CORRECT_PIN = '1928';
let pinEntry = '';

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).classList.toggle('filled', i < pinEntry.length);
  }
}

document.getElementById('pin-pad').addEventListener('click', e => {
  const key = e.target.closest('.pin-key');
  if (!key) return;
  const k = key.dataset.k;

  if (k === 'del') {
    pinEntry = pinEntry.slice(0, -1);
    document.getElementById('pin-error').textContent = '';
  } else if (pinEntry.length < 4) {
    pinEntry += k;
  }

  updatePinDots();

  if (pinEntry.length === 4) {
    if (pinEntry === CORRECT_PIN) {
      // Load saved config into fields
      document.getElementById('cfg-atm-wallet').value = localStorage.getItem('atm_wallet') || '';
      document.getElementById('cfg-atm-key').value    = localStorage.getItem('atm_key')    || '';
      document.getElementById('cfg-poll').value       = localStorage.getItem('poll_interval') || '10';
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('settings-screen').style.display = 'flex';
    } else {
      document.getElementById('pin-error').textContent = 'incorrect';
      pinEntry = '';
      updatePinDots();
    }
  }
});

// ── Settings actions ─────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', () => {
  localStorage.setItem('atm_wallet',    document.getElementById('cfg-atm-wallet').value.trim());
  localStorage.setItem('atm_key',       document.getElementById('cfg-atm-key').value.trim());
  localStorage.setItem('poll_interval', document.getElementById('cfg-poll').value);
  closeOverlay();
});

document.getElementById('btn-close-settings').addEventListener('click', closeOverlay);

document.getElementById('btn-reset-session').addEventListener('click', () => {
  if (confirm('Clear all visitor dots and reset participant count?')) {
    visitorDots.length = 0;
    participantCount = 0;
    updateCount();
    lnName.classList.remove('visible');
    closeOverlay();
  }
});

// ── Test button wiring ───────────────────────────────────────────
const DEMO_ADDRESSES = [
  'alice@blink.sv','marco@blink.sv','yuki@blink.sv','sara@blink.sv',
  'theo@blink.sv','nour@blink.sv','james@blink.sv','lena@blink.sv',
  'omar@blink.sv','priya@blink.sv','felix@blink.sv','amara@blink.sv',
  'dev@blink.sv','sol@blink.sv','remy@blink.sv',
];
let demoIdx = 0;

document.getElementById('btn-visitor').addEventListener('click', () => {
  addVisitor(DEMO_ADDRESSES[demoIdx % DEMO_ADDRESSES.length]);
  demoIdx++;
});
document.getElementById('btn-artwork').addEventListener('click', () => {
  triggerArtwork(Math.floor(Math.random() * NUM_ARTWORKS));
});
document.getElementById('btn-clear').addEventListener('click', () => {
  visitorDots.length = 0;
  participantCount = 0;
  updateCount();
  demoIdx = 0;
});
</script>
</body>
</html>
