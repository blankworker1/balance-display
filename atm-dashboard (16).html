<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALANCE — ATM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    position: relative;
    background: #0a0a0a;
  }

  /* The fill — rises from bottom, colour shifts green → amber → red as depleted */
  #fill-layer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    transition: height 2s cubic-bezier(0.4, 0, 0.2, 1), background-color 2s ease;
    z-index: 0;
  }

  /* Soft noise texture over fill */
  #fill-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
  }

  /* Horizontal waterline — thin, animated gentle wave */
  #waterline {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    z-index: 1;
    transition: bottom 2s cubic-bezier(0.4, 0, 0.2, 1), background-color 2s ease;
    opacity: 0.5;
  }

  #waterline::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: inherit;
    filter: blur(2px);
    opacity: 0.6;
  }

  /* Everything above the fold */
  #content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    gap: 0;
  }

  /* Wordmark */
  .wordmark {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(48px, 13.5vw, 200px);
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    margin-bottom: 32px;
    text-indent: 0.18em;
    line-height: 1;
  }

  /* Primary number */
  .sats-display {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: clamp(72px, 14vw, 160px);
    line-height: 1;
    color: rgba(255,255,255,0.92);
    letter-spacing: -0.02em;
    transition: color 1s ease;
    position: relative;
  }

  .sats-display.loading {
    color: rgba(255,255,255,0.15);
  }

  /* Unit label */
  .unit {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-top: 16px;
    text-indent: 0.5em;
  }

  /* Percentage — subtle, bottom-right feel but centred */
  .pct-display {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.2);
    margin-top: 40px;
    transition: color 1s ease;
  }



  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 28px;
    z-index: 20;
  }

  /* SATs ATM logo — top left */
  .sats-logo {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .sats-logo img,
  .sats-logo svg {
    height: 32px;
    width: auto;
    opacity: 0.82;
  }

  /* Email — true center column */
  .top-email {
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.6);
    text-align: center;
    white-space: nowrap;
  }
  .top-email span, .top-email a {
    color: rgba(255,255,255,0.6) !important;
    text-decoration: none !important;
    pointer-events: none;
  }

  /* Status dot — top right */
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.5s;
    justify-self: end;
  }
  .status-dot.live { background: rgba(255,255,255,0.5); animation: pulse-dot 3s ease-in-out infinite; }
  .status-dot.err  { background: rgba(255,100,80,0.8); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Blink badge — bottom right */
  .blink-badge {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
    opacity: 0.7;
    transition: opacity 0.3s;
    text-decoration: none;
    white-space: nowrap;
  }
  .blink-badge:hover { opacity: 1; }
  .blink-text {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .blink-logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #f7931a;
    letter-spacing: 0.25em;
    text-shadow: 0 0 20px rgba(247,147,26,0.5);
  }

  /* PIN */
  .pin-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 600;
    align-items: center; justify-content: center;
  }
  .pin-overlay.active { display: flex; }
  .pin-box {
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px; text-align: center; width: 280px;
  }
  .pin-title {
    font-size: 9px; letter-spacing: 0.5em;
    color: rgba(255,255,255,0.2); text-transform: uppercase; margin-bottom: 24px;
  }
  .pin-display {
    font-family: 'Nunito', sans-serif;
    font-size: 40px; font-weight: 300;
    color: rgba(255,255,255,0.8); letter-spacing: 0.3em;
    min-height: 50px; margin-bottom: 24px;
  }
  .pin-error { font-size: 10px; color: rgba(255,100,80,0.8); letter-spacing: 0.2em; min-height: 16px; margin-bottom: 14px; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .pin-key {
    font-family: 'Nunito', sans-serif;
    font-size: 16px; padding: 14px;
    background: none; border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.1s;
  }
  .pin-key:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); }
  .pin-key.clr { color: rgba(255,255,255,0.25); }

  /* SETTINGS */
  .settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 500;
    align-items: center; justify-content: center;
  }
  .settings-overlay.active { display: flex; }
  .settings-box {
    background: #111; border: 1px solid rgba(255,255,255,0.1);
    padding: 36px 40px; width: 420px; max-width: 90vw;
  }
  .settings-title {
    font-size: 9px; letter-spacing: 0.5em;
    color: rgba(255,255,255,0.25); text-transform: uppercase; margin-bottom: 28px;
  }
  .settings-field { margin-bottom: 18px; }
  .settings-field label {
    display: block; font-size: 9px; letter-spacing: 0.35em;
    color: rgba(255,255,255,0.2); text-transform: uppercase; margin-bottom: 8px;
  }
  .settings-field input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.75);
    font-family: 'Nunito', sans-serif; font-size: 13px;
    padding: 10px 14px; outline: none; letter-spacing: 0.03em; transition: border-color 0.2s;
  }
  .settings-field input:focus { border-color: rgba(255,255,255,0.3); }
  .settings-field input::placeholder { color: rgba(255,255,255,0.15); }
  .settings-hint { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 0.1em; margin-top: 6px; }
  .settings-actions { display: flex; gap: 10px; margin-top: 28px; }
  .btn {
    font-family: 'Nunito', sans-serif; font-size: 9px;
    letter-spacing: 0.35em; text-transform: uppercase;
    padding: 11px 20px; cursor: pointer; border: 1px solid; background: none; transition: all 0.2s;
  }
  .btn-primary { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  .btn-primary:hover { border-color: rgba(255,255,255,0.7); color: rgba(255,255,255,1); background: rgba(255,255,255,0.05); }
  .btn-secondary { border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.2); }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div id="fill-layer"></div>
<div id="waterline"></div>

<div id="content">
  <div class="wordmark">Balance</div>
  <div class="sats-display loading" id="satsValue">—</div>
  <div class="unit">Sats</div>
  <div class="pct-display" id="pctValue"></div>
</div>

<div class="top-bar">
  <div class="sats-logo" id="satsLogo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" style="height:36px;width:36px;display:block;">
      <rect x="0" y="0" width="500" height="500" rx="80" ry="80" fill="#FFD000"/>
      <circle cx="250" cy="250" r="190" fill="#C8C8C8" stroke="#0D0D0D" stroke-width="12"/>
      <polygon points="285,30 175,270 245,270 215,470 325,230 255,230" fill="#FFD000" stroke="#0D0D0D" stroke-width="10" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="top-email"><span>balanceatm&#64;blink&#46;sv</span></div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div style="position:fixed;bottom:0;left:0;right:0;height:80px;z-index:20" onclick="handleSettingsTap()"></div>

<a class="blink-badge" href="https://www.blink.sv" target="_blank">
  <span class="blink-text">Powered by</span>
  <span class="blink-logo">Blink</span>
</a>
<!-- PIN -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">Settings</div>
    <div class="pin-display" id="pinDisplay">____</div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key clr" onclick="pinClear()">Clr</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key clr" onclick="pinCancel()">×</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <div class="settings-title">Configuration</div>
    <div class="settings-field">
      <label>Blink API Key</label>
      <input type="password" id="apiKeyInput" placeholder="paste key here" autocomplete="off" />
    </div>
    <div class="settings-field">
      <label>Starting Balance (sats)</label>
      <input type="number" id="startBalInput" placeholder="e.g. 1000000" min="1" />
      <div class="settings-hint">Sets the full mark — 100% of screen</div>
    </div>
    <div class="settings-actions">
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
  var apiKey = localStorage.getItem('blink_api_key') || '';
  var startBalance = parseInt(localStorage.getItem('blink_start_balance') || '0');
  var ENDPOINT = 'https://api.blink.sv/graphql';
  var REFRESH_MS = 30000;
  var tapCount = 0, tapTimer = null, pinBuffer = '';
  var PIN = '1928';

  var BALANCE_QUERY = 'query Me { me { defaultAccount { wallets { id walletCurrency balance } } } }';

  // Colour ramps: full=deep teal-green, mid=warm neutral, low=amber, critical=dusky red
  function fillColour(pct) {
    if (pct > 0.6) return 'rgba(30, 80, 60, 0.85)';
    if (pct > 0.4) return 'rgba(40, 70, 55, 0.8)';
    if (pct > 0.25) return 'rgba(80, 65, 30, 0.8)';
    if (pct > 0.1) return 'rgba(100, 50, 20, 0.82)';
    return 'rgba(90, 25, 20, 0.85)';
  }

  function lineColour(pct) {
    if (pct > 0.4) return 'rgba(80, 200, 140, 0.6)';
    if (pct > 0.25) return 'rgba(200, 160, 60, 0.6)';
    if (pct > 0.1) return 'rgba(220, 110, 40, 0.6)';
    return 'rgba(210, 60, 50, 0.6)';
  }

  function applyGauge(pct) {
    pct = Math.max(0, Math.min(1, pct));
    var fill = document.getElementById('fill-layer');
    var line = document.getElementById('waterline');
    var pctEl = document.getElementById('pctValue');

    fill.style.height = (pct * 100) + '%';
    fill.style.backgroundColor = fillColour(pct);

    line.style.bottom = (pct * 100) + '%';
    line.style.backgroundColor = lineColour(pct);

    var rounded = Math.round(pct * 100);
    pctEl.textContent = '';

    // Dim text if fill is behind it (always keep legible)
    // The text colour stays light; fill darkness keeps contrast
  }

  function renderSats(sats, pct) {
    var el = document.getElementById('satsValue');
    el.textContent = Number(sats).toLocaleString('en-US');
    el.classList.remove('loading');
    applyGauge(pct);
  }

  if (apiKey && startBalance > 0) {
    fetchBalance();
    startRefreshCycle();
  }

  async function fetchBalance() {
    setStatus('loading');
    try {
      var res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-KEY': apiKey },
        body: JSON.stringify({ query: BALANCE_QUERY })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      if (data.errors) throw new Error(data.errors[0].message || 'GraphQL error');
      var wallets = data && data.data && data.data.me && data.data.me.defaultAccount && data.data.me.defaultAccount.wallets;
      if (!wallets) throw new Error('No wallet data');
      var btc = wallets.find(function(w) { return w.walletCurrency === 'BTC'; });
      var sats = btc ? btc.balance : 0;
      var pct = startBalance > 0 ? sats / startBalance : 1;
      renderSats(sats, pct);
      setStatus('live');
    } catch(e) {
      setStatus('err');
    }
  }

  function startRefreshCycle() {
    setInterval(function() { fetchBalance(); }, REFRESH_MS);
  }

  function setStatus(s) {
    var dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (s === 'live' ? ' live' : s === 'err' ? ' err' : '');
  }
}

  // Settings triple-tap
  function handleSettingsTap() {
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(function() { tapCount = 0; }, 800);
    if (tapCount >= 3) { tapCount = 0; openPin(); }
  }

  function openPin() {
    pinBuffer = '';
    document.getElementById('pinDisplay').textContent = '____';
    document.getElementById('pinError').textContent = '';
    document.getElementById('pinOverlay').classList.add('active');
  }

  function pinKey(d) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += d;
    document.getElementById('pinDisplay').textContent = pinBuffer.replace(/./g, '*').padEnd(4, '_');
    if (pinBuffer.length === 4) setTimeout(checkPin, 200);
  }

  function pinClear() {
    pinBuffer = '';
    document.getElementById('pinDisplay').textContent = '____';
    document.getElementById('pinError').textContent = '';
  }

  function pinCancel() {
    pinBuffer = '';
    document.getElementById('pinOverlay').classList.remove('active');
  }

  function checkPin() {
    if (pinBuffer === PIN) {
      document.getElementById('pinOverlay').classList.remove('active');
      showSettings();
    } else {
      document.getElementById('pinError').textContent = 'Incorrect';
      pinBuffer = '';
      document.getElementById('pinDisplay').textContent = '____';
    }
  }

  function showSettings() {
    document.getElementById('apiKeyInput').value = apiKey || '';
    document.getElementById('startBalInput').value = startBalance || '';
    document.getElementById('settingsOverlay').classList.add('active');
  }

  function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
  }

  function saveSettings() {
    var key = document.getElementById('apiKeyInput').value.trim();
    var sb = parseInt(document.getElementById('startBalInput').value.trim());
    if (!key || !sb || sb < 1) return;
    apiKey = key; startBalance = sb;
    localStorage.setItem('blink_api_key', apiKey);
    localStorage.setItem('bl
