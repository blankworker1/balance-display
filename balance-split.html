<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALANCE — Split</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }

  #split {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: row;
  }

  /* Each half fills 50% width, full height */
  .panel {
    width: 50%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  /* Thin divider line between panels */
  .panel:first-child::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: rgba(255,255,255,0.07);
    z-index: 10;
  }

  /*
    Each iframe is rendered at the native portrait resolution (1080×1920)
    then scaled down to fill the panel height, cropping the sides equally.
    Panel is 960×1080 (half of 1920×1080).
    Scale factor = 1080 / 1920 = 0.5625
    Scaled iframe width = 1080 * 0.5625 = 607.5px  (panel is 960px wide → crops ~176px each side)
    We use transform-origin center + translate to keep it centred.
  */
  .panel iframe {
    position: absolute;
    width: 1080px;
    height: 1920px;
    top: 0;
    left: 50%;
    transform-origin: top center;
    transform: translateX(-50%) scale(0.5625);
    border: none;
    pointer-events: all;
  }
</style>
</head>
<body>
<div id="split">

  <!-- LEFT: HUB -->
  <div class="panel" id="panel-hub">
    <iframe id="frame-hub" srcdoc=""></iframe>
  </div>

  <!-- RIGHT: BALANCE -->
  <div class="panel" id="panel-balance">
    <iframe id="frame-balance" srcdoc=""></iframe>
  </div>

</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1080, H = 1920;
canvas.width = W; canvas.height = H;
const CX = W/2, CY = H*0.45;
const ARTWORK_RING_R = W*0.44, VISITOR_MIN_R = W*0.10, VISITOR_MAX_R = W*0.30;
const R_HUB = 20, R_ARTWORK = 13, R_VISITOR = 4;
const NUM_ARTWORKS = 21;
const artworkDots = Array.from({length:NUM_ARTWORKS},(_,i)=>{
  const angle=(i/NUM_ARTWORKS)*Math.PI*2-Math.PI/2;
  return{x:CX+Math.cos(angle)*ARTWORK_RING_R,y:CY+Math.sin(angle)*ARTWORK_RING_R,index:i+1,pulseTimer:0,PULSE_DUR:5000};
});
const visitorDots=[];let participantCount=0;
const lnName=document.getElementById('ln-name');
const boxRight=document.getElementById('box-right');
function showLN(a){lnName.classList.remove('visible');setTimeout(()=>{lnName.textContent=a;lnName.classList.add('visible');},850);}
function updateCount(){boxRight.textContent=participantCount;}
function addVisitor(ln){
  const angle=Math.random()*Math.PI*2,t=Math.pow(Math.random(),0.65),r=VISITOR_MIN_R+t*(VISITOR_MAX_R-VISITOR_MIN_R);
  visitorDots.push({x:CX+Math.cos(angle)*r,y:CY+Math.sin(angle)*r,opacity:0});
  participantCount++;updateCount();if(ln)showLN(ln);
}
function triggerArtwork(i){if(i>=0&&i<NUM_ARTWORKS)artworkDots[i].pulseTimer=artworkDots[i].PULSE_DUR;}
function drawGlow(x,y,radius,r,g,b,a){
  const grad=ctx.createRadialGradient(x,y,0,x,y,radius*6);
  grad.addColorStop(0,\`rgba(\${r},\${g},\${b},\${+(a*0.45).toFixed(3)})\`);
  grad.addColorStop(0.5,\`rgba(\${r},\${g},\${b},\${+(a*0.12).toFixed(3)})\`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(x,y,radius*6,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
}
function drawCircle(x,y,radius,r,g,b,a){
  ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,a));
  ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fillStyle=\`rgb(\${r},\${g},\${b})\`;ctx.fill();ctx.restore();
}
function drawNumber(x,y,num,a){
  ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,a));ctx.fillStyle='#000';
  ctx.font=\`600 \${R_ARTWORK*1.35}px 'Nunito',sans-serif\`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(String(num),x,y+0.5);ctx.restore();
}
let lastTime=performance.now(),elapsed=0;
function render(now){
  const dt=Math.min(now-lastTime,80);lastTime=now;elapsed+=dt;
  ctx.clearRect(0,0,W,H);
  const breath=0.7+0.3*(0.5+0.5*Math.sin(elapsed/4000*Math.PI*2));
  drawGlow(CX,CY,R_HUB,255,255,255,breath*0.75);drawCircle(CX,CY,R_HUB,255,255,255,breath);
  for(const dot of artworkDots){
    if(dot.pulseTimer>0)dot.pulseTimer=Math.max(0,dot.pulseTimer-dt);
    const t=dot.pulseTimer/dot.PULSE_DUR;
    const dr=Math.round(255+(245-255)*t),dg=Math.round(255+(166-255)*t),db=Math.round(255+(35-255)*t),da=0.65+t*0.35;
    if(t>0)drawGlow(dot.x,dot.y,R_ARTWORK,245,166,35,t*0.8);
    drawCircle(dot.x,dot.y,R_ARTWORK,dr,dg,db,da);
    if(t>0.05)drawNumber(dot.x,dot.y,dot.index,t*da);
  }
  for(const v of visitorDots){
    if(v.opacity<1)v.opacity=Math.min(1,v.opacity+dt/1200);
    drawCircle(v.x,v.y,R_VISITOR,255,255,255,v.opacity*0.72);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
const boxLeft=document.getElementById('box-left');
const overlay=document.getElementById('settings-overlay');
let tapCount=0,tapTimer=null;
boxLeft.addEventListener('click',()=>{
  tapCount++;clearTimeout(tapTimer);tapTimer=setTimeout(()=>{tapCount=0;},600);
  if(tapCount>=3){tapCount=0;openOverlay();}
});
function openOverlay(){
  pinEntry='';updatePinDots();document.getElementById('pin-error').textContent='';
  document.getElementById('pin-screen').style.display='flex';
  document.getElementById('settings-screen').style.display='none';
  overlay.classList.add('visible');
}
function closeOverlay(){overlay.classList.remove('visible');}
const CORRECT_PIN='1928';let pinEntry='';
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinEntry.length);}
document.getElementById('pin-pad').addEventListener('click',e=>{
  const key=e.target.closest('.pin-key');if(!key)return;
  const k=key.dataset.k;
  if(k==='del'){pinEntry=pinEntry.slice(0,-1);document.getElementById('pin-error').textContent='';}
  else if(pinEntry.length<4)pinEntry+=k;
  updatePinDots();
  if(pinEntry.length===4){
    if(pinEntry===CORRECT_PIN){
      document.getElementById('cfg-atm-wallet').value=localStorage.getItem('atm_wallet')||'';
      document.getElementById('cfg-atm-key').value=localStorage.getItem('atm_key')||'';
      document.getElementById('cfg-poll').value=localStorage.getItem('poll_interval')||'10';
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('settings-screen').style.display='flex';
    }else{document.getElementById('pin-error').textContent='incorrect';pinEntry='';updatePinDots();}
  }
});
document.getElementById('btn-save').addEventListener('click',()=>{
  localStorage.setItem('atm_wallet',document.getElementById('cfg-atm-wallet').value.trim());
  localStorage.setItem('atm_key',document.getElementById('cfg-atm-key').value.trim());
  localStorage.setItem('poll_interval',document.getElementById('cfg-poll').value);
  closeOverlay();
});
document.getElementById('btn-close-settings').addEventListener('click',closeOverlay);
document.getElementById('btn-reset-session').addEventListener('click',()=>{
  if(confirm('Clear all visitor dots and reset participant count?')){
    visitorDots.length=0;participantCount=0;updateCount();lnName.classList.remove('visible');closeOverlay();
  }
});
const DEMO=['alice@blink.sv','marco@blink.sv','yuki@blink.sv','sara@blink.sv','theo@blink.sv','nour@blink.sv','james@blink.sv','lena@blink.sv','omar@blink.sv','priya@blink.sv','felix@blink.sv','amara@blink.sv'];
let demoIdx=0;
document.getElementById('btn-visitor').addEventListener('click',()=>{addVisitor(DEMO[demoIdx%DEMO.length]);demoIdx++;});
document.getElementById('btn-artwork').addEventListener('click',()=>{triggerArtwork(Math.floor(Math.random()*NUM_ARTWORKS));});
document.getElementById('btn-clear').addEventListener('click',()=>{visitorDots.length=0;participantCount=0;updateCount();demoIdx=0;});
<\/script>
</body>
</html>`;

<script>
const defaultView = document.getElementById('default-view');
const tipView     = document.getElementById('tip-view');
const tipAmount   = document.getElementById('tip-amount');
const tipArtwork  = document.getElementById('tip-artwork');
const tipMemo     = document.getElementById('tip-memo');

let tipPosition = 'top';
let queue = [];
let busy  = false;

function showTip(sats, artwork, memo) {
  queue.push({sats, artwork, memo});
  if (!busy) processQueue();
}

function processQueue() {
  if (queue.length === 0) { busy = false; return; }
  busy = true;
  const {sats, artwork, memo} = queue.shift();
  const holdMs = 8000 + (memo ? memo.length * 80 : 0);

  tipPosition = tipPosition === 'top' ? 'bottom' : 'top';
  tipView.className = 'top';
  tipView.classList.add(tipPosition);

  tipAmount.textContent  = sats.toLocaleString().replace(/,/g,'');
  tipArtwork.textContent = artwork || '';
  tipMemo.textContent    = memo || '';

  // Crossfade in
  defaultView.style.transition = 'opacity 5s ease';
  tipView.style.transition     = 'opacity 5s ease';
  defaultView.style.opacity    = '0';
  tipView.style.opacity        = '1';

  setTimeout(() => {
    // Crossfade back
    defaultView.style.opacity = '1';
    tipView.style.opacity     = '0';
    setTimeout(() => processQueue(), 5000);
  }, holdMs);
}

const ARTWORKS = ['Open Secret 1','Open Secret 2','Open Secret 3','Open Secret 4','Open Secret 5',

  'Open Secret 11','Open Secret 12','Open Secret 13','Open Secret 14','Open Secret 15',
